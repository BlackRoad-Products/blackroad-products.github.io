function mkFuse(){fuse=new Fuse(all,{keys:[{name:'name',weight:3},{name:'agent',weight:2},{name:'role',weight:2},{name:'product',weight:1.5},{name:'desc',weight:1.5},{name:'org',weight:1},{name:'tags',weight:1},{name:'pill',weight:1}],threshold:0.35,includeMatches:true,minMatchCharLength:2});}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(txt,ms,k){
  if(!ms||!txt)return esc(txt);const m=ms.find(x=>x.key===k);
  if(!m||!m.indices)return esc(txt);
  let o='',l=0,s=String(txt);
  for(const[a,b]of m.indices){o+=esc(s.slice(l,a));o+='<span class="hl">'+esc(s.slice(a,b+1))+'</span>';l=b+1;}
  return o+esc(s.slice(l));
}
function card(r){

  else if(t==='agent')sub='<div class="cs sa">'+hl(i.role,m,'role')+' &middot; '+hl(i.product,m,'product')+'</div>';
  else if(t==='repo')sub='<div class="cs sr">'+hl(i.org,m,'org')+(i.domain?' &middot; '+esc(i.domain):'')+'</div>';
  else if(t==='domain')sub='<div class="cs sd">'+esc(i.url)+'</div>';
  else if(t==='org')sub='<div class="cs so">'+esc(i.url)+'</div>';
  const pill=t==='product'?'<span class="pill">'+esc(i.pill)+'</span>':'';
  return '<a class="card" href="'+esc(i.url)+'" target="_blank" rel="noopener"><div class="ch"><div class="ct">'+hl(i.name,m,'name')+'</div><span class="tb t'+t[0]+'">'+t+'</span></div>'+sub+'<div class="cd">'+hl(i.desc,m,'desc')+'</div>'+pill+'</a>';
}
function items(){

  if(af!=='all')r=r.filter(x=>x.item.type===af);
  return r.slice(0,60);
}
function render(){
  const g=document.getElementById('grid'),rm=document.getElementById('rm'),rs=items();
  if(!aq){
    rm.textContent=af==='all'?'18 products · '+all.length+' total entries':(rs.length+' '+af+(rs.length!==1?'s':''));
    g.innerHTML=rs.map(card).join('');return;
  }
  if(!rs.length){rm.textContent='No results for '+aq;g.innerHTML='<div class="empty"><big>&#128269;</big>No results for <strong>'+esc(aq)+'</strong></div>';return;}
  rm.textContent=rs.length+' result'+(rs.length!==1?'s':'')+' for "'+esc(aq)+'"';
  if(af==='all'){
    const grp={};for(const r of rs){const t=r.item.type;(grp[t]=grp[t]||[]).push(r);}
    let h='';
    for(const t of['product','agent','domain','org','repo']){
      if(!grp[t])continue;
      const l={product:'Products',agent:'Agents',domain:'Domains',org:'Orgs',repo:'Repos'}[t];
      h+='<div class="sl">'+l+' <span>'+grp[t].length+'</span></div>';h+=grp[t].map(card).join('');
    }
    g.innerHTML=h;
  }else{g.innerHTML=rs.map(card).join('');}
}
const qi=document.getElementById('q');
qi.addEventListener('input',e=>{aq=e.target.value.trim();render();});
qi.addEventListener('keydown',e=>{
  if(e.key==='Enter'){const r=items();if(r.length)window.open(r[0].item.url,'_blank');}
  if(e.key==='Escape'){qi.value='';aq='';render();}
});
document.querySelectorAll('.fb').forEach(b=>{
  b.addEventListener('click',()=>{af=b.dataset.f;document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');render();});
});
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();qi.focus();qi.select();}});
mkFuse();render();
</script>
</body>
</html>
